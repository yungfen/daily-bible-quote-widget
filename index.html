<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Bible Quote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #F5F1E8;
            --container-bg: #FDFBF7;
            --text-color: #4A4036;
            --quote-color: #695D4F;
            --reference-color: #8B7355;
            --date-color: #A69B8D;
            --divider-color: #D4C5B1;
            --button-bg: #8B7355;
            --button-text: #FFFFFF;
            --button-hover: #695D4F;
            --section-bg: rgba(255, 255, 255, 0.5);
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Lato', sans-serif;
            --font-chinese: 'Noto Serif TC', serif;
            --shadow-soft: 0 4px 24px rgba(121, 108, 93, 0.08);
            --shadow-elevated: 0 8px 32px rgba(121, 108, 93, 0.12);
            --copy-btn-bg: rgba(139, 115, 85, 0.08);
            --copy-btn-border: rgba(139, 115, 85, 0.15);
        }

        [data-theme="dark"] {
            --bg-color: #1E1B18;
            --container-bg: #2A2622;
            --text-color: #E5DFD6;
            --quote-color: #D4C5B1;
            --reference-color: #B8A99A;
            --date-color: #8B7355;
            --divider-color: #4A4036;
            --button-bg: #8B7355;
            --button-text: #FFFFFF;
            --button-hover: #A69B8D;
            --section-bg: rgba(255, 255, 255, 0.04);
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.2);
            --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.3);
            --copy-btn-bg: rgba(255, 255, 255, 0.06);
            --copy-btn-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        html { height: 100%; }

        body {
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100%;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 1rem;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: var(--shadow-soft);
            text-align: center;
            max-width: 90%;
            width: 820px;
            border: 1px solid rgba(121, 108, 93, 0.08);
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .buttons {
            display: flex;
            gap: 0.5rem;
            position: relative;
        }

        .button {
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            padding: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            transition: all 0.25s ease;
        }
        .button:hover {
            background-color: var(--button-hover);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .button:active { transform: translateY(0); }
        .button svg { width: 16px; height: 16px; fill: currentColor; }

        .button.spinning svg {
            animation: spin 0.6s ease-in-out;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .quotes-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin: 1rem 0;
        }

        .quote-section {
            text-align: left;
            padding: 1.25rem;
            border-radius: 12px;
            background-color: var(--section-bg);
            position: relative;
            transition: background-color 0.4s ease, transform 0.25s ease;
        }
        .quote-section:hover { transform: translateY(-2px); }

        .quote-section .copy-button {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            opacity: 0;
            transition: opacity 0.25s ease, transform 0.25s ease;
            background-color: var(--copy-btn-bg);
            border: 1px solid var(--copy-btn-border);
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
            width: auto;
            height: auto;
            backdrop-filter: blur(4px);
        }
        .quote-section:hover .copy-button { opacity: 0.8; }
        .quote-section .copy-button:hover { opacity: 1; transform: scale(1.05); }
        .quote-section .copy-button svg { width: 14px; height: 14px; fill: var(--text-color); }

        .lang-label {
            font-family: var(--font-sans);
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--date-color);
            margin-bottom: 0.5rem;
        }

        .quote {
            font-family: var(--font-serif);
            font-size: 1.15rem;
            line-height: 1.65;
            margin: 0.5rem 0;
            font-style: italic;
            color: var(--quote-color);
            transition: opacity 0.3s ease;
        }
        .quote.chinese {
            font-family: var(--font-chinese);
            font-style: normal;
            line-height: 1.8;
        }

        .reference {
            font-family: var(--font-serif);
            font-weight: 600;
            color: var(--reference-color);
            margin-top: 0.75rem;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        .reference.chinese { font-family: var(--font-chinese); }

        .date {
            color: var(--date-color);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--divider-color), transparent);
            margin: 0.75rem auto;
        }

        .cross-ornament {
            color: var(--divider-color);
            font-size: 0.75rem;
            text-align: center;
            margin: 0.5rem 0;
            letter-spacing: 4px;
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--section-bg) 25%, rgba(139, 115, 85, 0.08) 50%, var(--section-bg) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite;
            border-radius: 4px;
            height: 1em;
            margin: 0.4rem 0;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .skeleton.line-1 { width: 90%; }
        .skeleton.line-2 { width: 75%; }
        .skeleton.line-3 { width: 40%; margin-top: 0.75rem; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background-color: var(--container-bg);
            color: var(--text-color);
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--divider-color);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            font-size: 0.85rem;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Font selector */
        .font-selector {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background-color: var(--container-bg);
            border-radius: 10px;
            padding: 0.4rem;
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--divider-color);
            display: none;
            z-index: 100;
        }
        .font-selector.show {
            display: block;
            animation: fadeIn 0.15s ease-out;
        }

        .font-option {
            display: block;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            color: var(--text-color);
            transition: background-color 0.2s ease;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .font-option:hover { background-color: var(--section-bg); }
        .font-option.active { background-color: var(--button-bg); color: var(--button-text); }
        .font-option .zh { margin-left: 0.5rem; opacity: 0.7; }

        /* Share menu */
        .share-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--container-bg);
            border: 1px solid var(--divider-color);
            border-radius: 10px;
            padding: 0.4rem;
            box-shadow: var(--shadow-elevated);
            display: none;
            z-index: 100;
        }
        .share-menu.show {
            display: block;
            animation: fadeIn 0.15s ease-out;
        }

        .share-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            color: var(--text-color);
            transition: background-color 0.2s;
            border-radius: 6px;
            white-space: nowrap;
            font-size: 0.85rem;
        }
        .share-option:hover { background-color: var(--section-bg); }
        .share-option svg { width: 1rem; height: 1rem; fill: currentColor; flex-shrink: 0; }

        /* Font style pairs */
        .font-classic { --font-serif: 'Cormorant Garamond', serif; --font-chinese: 'Noto Serif TC', serif; }
        .font-modern { --font-serif: 'Playfair Display', serif; --font-chinese: 'Noto Sans TC', sans-serif; }
        .font-elegant { --font-serif: 'EB Garamond', serif; --font-chinese: 'Noto Serif TC', serif; }
        .font-traditional { --font-serif: 'Crimson Pro', serif; --font-chinese: 'Noto Serif TC', serif; }
        .font-formal { --font-serif: 'Merriweather', serif; --font-chinese: 'Noto Sans TC', sans-serif; }

        /* Quote capture (offscreen for image generation) */
        .quote-capture {
            position: fixed;
            left: -9999px;
            top: -9999px;
            background: var(--container-bg);
            padding: 3rem;
            border-radius: 1rem;
            width: 1080px;
            font-family: var(--font-sans);
        }
        .quote-capture .capture-section {
            margin-bottom: 2rem;
        }
        .quote-capture .capture-section:last-of-type {
            margin-bottom: 0;
        }
        .quote-capture .capture-label {
            font-size: 0.8rem;
            color: var(--date-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.75rem;
        }
        .quote-capture .capture-divider {
            width: 60px;
            height: 1px;
            background: var(--divider-color);
            margin: 2rem auto;
        }
        .quote-capture .quote {
            font-size: 1.8rem;
            line-height: 1.7;
            margin-bottom: 0.75rem;
        }
        .quote-capture .quote.chinese {
            font-family: var(--font-chinese);
            font-style: normal;
            font-size: 1.6rem;
            line-height: 1.9;
        }
        .quote-capture .reference { font-size: 1.2rem; }
        .quote-capture .reference.chinese { font-family: var(--font-chinese); }
        .quote-capture .watermark {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--date-color);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
        }

        /* Calendar panel */
        .calendar-panel {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background-color: var(--container-bg);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: var(--shadow-elevated);
            border: 1px solid var(--divider-color);
            display: none;
            z-index: 100;
            width: 280px;
            user-select: none;
        }
        .calendar-panel.show {
            display: block;
            animation: fadeIn 0.15s ease-out;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .calendar-title {
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-color);
            letter-spacing: 0.5px;
        }
        .calendar-nav {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--reference-color);
            padding: 0.25rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        .calendar-nav:hover {
            background-color: var(--section-bg);
        }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.65rem;
            color: var(--date-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
            font-family: var(--font-sans);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-color);
            transition: all 0.15s ease;
            font-family: var(--font-sans);
            position: relative;
        }
        .calendar-day:hover {
            background-color: var(--section-bg);
        }
        .calendar-day.today {
            background-color: var(--button-bg);
            color: var(--button-text);
            font-weight: 700;
        }
        .calendar-day.selected {
            outline: 2px solid var(--button-bg);
            outline-offset: -2px;
        }
        .calendar-day.other-month {
            color: var(--divider-color);
        }
        .calendar-day.future {
            color: var(--divider-color);
            cursor: default;
            pointer-events: none;
        }
        .calendar-today-btn {
            margin-top: 0.6rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--reference-color);
            cursor: pointer;
            padding: 0.35rem;
            border-radius: 6px;
            transition: background-color 0.2s;
            font-family: var(--font-sans);
            display: none;
        }
        .calendar-today-btn:hover {
            background-color: var(--section-bg);
        }
        .calendar-today-btn.show {
            display: block;
        }
        /* Date indicator when viewing past verse */
        .date-viewing {
            display: inline-block;
            font-size: 0.7rem;
            background: var(--button-bg);
            color: var(--button-text);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.5rem;
            vertical-align: middle;
            cursor: pointer;
        }

        /* Theme toggle icon visibility */
        [data-theme="dark"] .moon { display: none; }
        [data-theme="dark"] .sun { display: block; }
        [data-theme="light"] .moon, :root:not([data-theme]) .moon { display: block; }
        [data-theme="light"] .sun, :root:not([data-theme]) .sun { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 0.5rem; align-items: flex-start; padding-top: 1rem; }
            .container { padding: 1.25rem; max-width: 100%; border-radius: 12px; }
            .quotes-container { grid-template-columns: 1fr; gap: 1rem; }
            .quote { font-size: 1.05rem; }
            .quote-section { padding: 1rem; }
            .quote-section .copy-button { opacity: 0.6; }
            .header { flex-wrap: wrap; gap: 0.5rem; }
            .date { font-size: 0.75rem; }
        }
        @media (max-width: 400px) {
            .container { padding: 1rem; }
            .quote { font-size: 0.95rem; }
            .button { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="date" id="currentDate"></div>
            <div class="buttons">
                <button class="button" id="calendarButton" title="Calendar" aria-label="Calendar">
                    <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
                </button>
                <button class="button" id="refreshButton" title="Refresh verse" aria-label="Refresh verse">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
                <button class="button" id="fontButton" title="Change font" aria-label="Change font">
                    <svg viewBox="0 0 24 24"><path d="M9.93 13.5h4.14L12 7.98zM20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-4.05 16.5l-1.14-3H9.17l-1.12 3H5.96l5.11-13h1.86l5.11 13h-2.09z"/></svg>
                </button>
                <button class="button" id="shareButton" title="Share verse" aria-label="Share verse">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                </button>
                <button class="button" id="themeButton" title="Toggle theme" aria-label="Toggle theme">
                    <svg class="moon" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                    <svg class="sun" viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79zM4 10.5H1v2h3zm9-9.95h-2V3.5h2zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79zM20 10.5v2h3v-2zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41z"/></svg>
                </button>
                <div class="font-selector" id="fontSelector">
                    <div class="font-option" data-font="classic"><span class="en">Classic</span><span class="zh">經典</span></div>
                    <div class="font-option" data-font="modern"><span class="en">Modern</span><span class="zh">現代</span></div>
                    <div class="font-option" data-font="elegant"><span class="en">Elegant</span><span class="zh">優雅</span></div>
                    <div class="font-option" data-font="traditional"><span class="en">Traditional</span><span class="zh">傳統</span></div>
                    <div class="font-option" data-font="formal"><span class="en">Formal</span><span class="zh">正式</span></div>
                </div>
                <div class="share-menu" id="shareMenu">
                    <div class="share-option" id="shareNative">
                        <svg viewBox="0 0 24 24"><path d="M16 5l-1.42 1.42-1.59-1.59V16h-1.98V4.83L9.42 6.42 8 5l4-4 4 4zm4 5v11c0 1.1-.9 2-2 2H6c-1.11 0-2-.9-2-2V10c0-1.11.89-2 2-2h3v2H6v11h12V10h-3V8h3c1.1 0 2 .89 2 2z"/></svg>
                        分享圖片
                    </div>
                    <div class="share-option" id="shareDownload">
                        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        下載圖片
                    </div>
                </div>
                <div class="calendar-panel" id="calendarPanel">
                    <div class="calendar-header">
                        <button class="calendar-nav" id="calPrev" aria-label="Previous month">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" fill="currentColor"/></svg>
                        </button>
                        <div class="calendar-title" id="calTitle"></div>
                        <button class="calendar-nav" id="calNext" aria-label="Next month">
                            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" fill="currentColor"/></svg>
                        </button>
                    </div>
                    <div class="calendar-weekdays">
                        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                    </div>
                    <div class="calendar-grid" id="calGrid"></div>
                    <div class="calendar-today-btn" id="calTodayBtn">回到今天</div>
                </div>
            </div>
        </div>
        <div class="divider"></div>
        <div class="cross-ornament">&#10022;</div>
        <div class="quotes-container">
            <div class="quote-section" id="sectionEn">
                <div class="lang-label">English &middot; KJV</div>
                <div class="quote" id="quoteEn">
                    <div class="skeleton line-1"></div>
                    <div class="skeleton line-2"></div>
                </div>
                <div class="reference" id="referenceEn">
                    <div class="skeleton line-3"></div>
                </div>
                <button class="button copy-button" title="Copy English verse" aria-label="Copy English verse">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
            <div class="quote-section" id="sectionZh">
                <div class="lang-label">&#20013;&#25991; &middot; &#21644;&#21512;&#26412;</div>
                <div class="quote chinese" id="quoteZh">
                    <div class="skeleton line-1"></div>
                    <div class="skeleton line-2"></div>
                </div>
                <div class="reference chinese" id="referenceZh">
                    <div class="skeleton line-3"></div>
                </div>
                <button class="button copy-button" title="Copy Chinese verse" aria-label="Copy Chinese verse">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="quote-capture" id="quoteCapture">
        <div class="capture-section">
            <div class="capture-label">English · KJV</div>
            <div class="quote" id="captureQuoteEn"></div>
            <div class="reference" id="captureReferenceEn"></div>
        </div>
        <div class="capture-divider"></div>
        <div class="capture-section">
            <div class="capture-label">中文 · 和合本</div>
            <div class="quote chinese" id="captureQuoteZh"></div>
            <div class="reference chinese" id="captureReferenceZh"></div>
        </div>
        <div class="watermark">Daily Bible Quote ✦ 每日聖經金句</div>
    </div>

    <script>
        // ─── Verse List ───────────────────────────────────────
        const verseList = [
            'JER.29.11', 'PSA.23.1', 'PRO.3.5-6', 'PHP.4.13', 'ISA.40.31',
            'MAT.11.28', 'JHN.3.16', 'ROM.8.28', '1CO.13.13', 'PSA.46.1',
            'JOS.1.9', 'HEB.11.1', 'ROM.12.2', '2CO.5.7', 'GAL.5.22-23',
            'EPH.2.8-9', 'PHP.4.6-7', 'COL.3.23', '1JN.4.19', 'PSA.119.105',
            'PSA.91.1-2', 'MAT.6.33', 'ISA.41.10', 'ROM.15.13', 'PSA.37.4',
            'PRO.16.3', 'MAT.5.16', '2TI.1.7', 'PSA.27.1', 'HEB.13.8'
        ];

        // ─── Cache Layer ──────────────────────────────────────
        // Cache is keyed by verseId so browsing the calendar doesn't
        // re-fetch the same verse twice in one session.
        const CACHE_KEY = 'bible_verse_cache';

        function getVerseCache() {
            try {
                var raw = sessionStorage.getItem(CACHE_KEY);
                if (!raw) return {};
                return JSON.parse(raw);
            } catch (e) { return {}; }
        }

        function getCachedVerse(verseId) {
            var cache = getVerseCache();
            return cache[verseId] || null;
        }

        function setCachedVerse(verseId, data) {
            try {
                var cache = getVerseCache();
                cache[verseId] = data;
                sessionStorage.setItem(CACHE_KEY, JSON.stringify(cache));
            } catch (e) { /* silently fail */ }
        }

        // ─── Theme ────────────────────────────────────────────
        const themeButton = document.getElementById('themeButton');

        function setTheme(isDark) {
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch (e) {}
        }

        let savedTheme = 'light';
        try { savedTheme = localStorage.getItem('theme') || 'light'; } catch (e) {}
        setTheme(savedTheme === 'dark');

        themeButton.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            setTheme(!isDark);
        });

        // ─── Toast ────────────────────────────────────────────
        let toastTimeout = null;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ─── Copy ─────────────────────────────────────────────
        async function copyToClipboard(text) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    showToast('Copied to clipboard \u2713');
                    return;
                }
            } catch (e) { /* fall through */ }

            // Fallback for insecure contexts (e.g., Notion embed)
            try {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.setAttribute('readonly', '');
                textArea.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
                document.body.appendChild(textArea);
                textArea.select();
                textArea.setSelectionRange(0, 99999);
                const ok = document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast(ok ? 'Copied to clipboard \u2713' : 'Copy failed');
            } catch (err) {
                showToast('Copy failed');
            }
        }

        // ─── Fetch Verse ──────────────────────────────────────
        const FALLBACK_VERSE = {
            english: {
                quote: "For I know the plans I have for you, declares the Lord, plans for welfare and not for evil, to give you a future and a hope.",
                reference: "Jeremiah 29:11"
            },
            chinese: {
                quote: "\u8036\u548C\u83EF\u8AAA\uFF1A\u6211\u77E5\u9053\u6211\u5411\u4F60\u5011\u6240\u61F7\u7684\u610F\u5FF5\u662F\u8CDC\u5E73\u5B89\u7684\u610F\u5FF5\uFF0C\u4E0D\u662F\u964D\u707D\u798D\u7684\u610F\u5FF5\uFF0C\u8981\u53EB\u4F60\u5011\u672B\u5F8C\u6709\u6307\u671B\u3002",
                reference: "\u8036\u5229\u7C73\u66F8 29:11"
            }
        };

        async function fetchVerse(verseId) {
            var cached = getCachedVerse(verseId);
            if (cached) {
                return cached;
            }

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(
                    '/.netlify/functions/get-bible-verse?verseId=' + encodeURIComponent(verseId),
                    { signal: controller.signal }
                );
                clearTimeout(timeout);

                if (!response.ok) throw new Error('HTTP ' + response.status);

                const data = await response.json();

                // Handle error response that includes fallback data
                if (data.error) {
                    if (data.english && data.chinese) {
                        const result = { english: data.english, chinese: data.chinese };
                        setCachedVerse(verseId, result);
                        return result;
                    }
                    throw new Error(data.error);
                }

                const result = {
                    english: { quote: cleanText(data.english.quote), reference: data.english.reference },
                    chinese: { quote: cleanText(data.chinese.quote), reference: data.chinese.reference }
                };

                setCachedVerse(verseId, result);
                return result;
            } catch (error) {
                console.error('Error fetching verse:', error.message);
                return FALLBACK_VERSE;
            }
        }

        function cleanText(text) {
            if (!text) return '';
            return text
                .replace(/<[^>]*>/g, '')
                .replace(/&[a-z]+;/gi, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        // ─── Verse Selection ──────────────────────────────────
        function getVerseForDate(date) {
            var start = new Date(date.getFullYear(), 0, 0);
            var dayOfYear = Math.floor((date - start) / (1000 * 60 * 60 * 24));
            return verseList[dayOfYear % verseList.length];
        }

        function getVerseForToday() {
            return getVerseForDate(new Date());
        }

        // ─── Date Display ─────────────────────────────────────
        var viewingDate = null; // null = today

        function updateDate(date) {
            var d = date || new Date();
            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            var dateEl = document.getElementById('currentDate');
            dateEl.textContent = d.toLocaleDateString('en-US', options);

            // Show/remove "viewing past" indicator
            var existingBadge = dateEl.querySelector('.date-viewing');
            if (existingBadge) existingBadge.remove();

            if (date && !isSameDay(date, new Date())) {
                var badge = document.createElement('span');
                badge.className = 'date-viewing';
                badge.textContent = '\u2190 \u56DE\u4ECA\u5929';
                badge.addEventListener('click', function() {
                    viewingDate = null;
                    updateDate();
                    displayQuote();
                    renderCalendar();
                });
                dateEl.appendChild(badge);
            }
        }

        function isSameDay(a, b) {
            return a.getFullYear() === b.getFullYear() &&
                   a.getMonth() === b.getMonth() &&
                   a.getDate() === b.getDate();
        }

        // ─── Display Quote ────────────────────────────────────
        let currentVerse = null;

        async function displayQuote(date) {
            var d = date || new Date();
            var verseId = getVerseForDate(d);
            var verse = await fetchVerse(verseId);
            currentVerse = verse;

            var quoteEn = document.getElementById('quoteEn');
            var quoteZh = document.getElementById('quoteZh');
            var refEn = document.getElementById('referenceEn');
            var refZh = document.getElementById('referenceZh');

            quoteEn.textContent = '\u201C' + verse.english.quote + '\u201D';
            refEn.textContent = '\u2014 ' + verse.english.reference;

            quoteZh.textContent = '\u300C' + verse.chinese.quote + '\u300D';
            refZh.textContent = '\u2014 ' + verse.chinese.reference;

            quoteZh.className = 'quote chinese';
            refZh.className = 'reference chinese';
        }

        // ─── Copy Buttons (stable event listeners) ───────────
        document.getElementById('sectionEn').querySelector('.copy-button').addEventListener('click', function(e) {
            e.stopPropagation();
            if (!currentVerse) return;
            copyToClipboard(currentVerse.english.quote + '\n\u2014 ' + currentVerse.english.reference);
        });

        document.getElementById('sectionZh').querySelector('.copy-button').addEventListener('click', function(e) {
            e.stopPropagation();
            if (!currentVerse) return;
            copyToClipboard(currentVerse.chinese.quote + '\n\u2014 ' + currentVerse.chinese.reference);
        });

        // ─── Refresh ──────────────────────────────────────────
        const refreshButton = document.getElementById('refreshButton');
        let isRefreshing = false;

        refreshButton.addEventListener('click', async function() {
            if (isRefreshing) return;
            isRefreshing = true;
            refreshButton.classList.add('spinning');
            try { sessionStorage.removeItem(CACHE_KEY); } catch (e) {}
            viewingDate = null;
            updateDate();
            await displayQuote();
            renderCalendar();
            setTimeout(function() {
                refreshButton.classList.remove('spinning');
                isRefreshing = false;
            }, 600);
        });

        // ─── Font Handling ────────────────────────────────────
        const fontButton = document.getElementById('fontButton');
        const fontSelector = document.getElementById('fontSelector');

        var currentFont = 'classic';
        try { currentFont = localStorage.getItem('font') || 'classic'; } catch (e) {}
        setFont(currentFont);

        function setFont(fontName) {
            var container = document.querySelector('.container');
            var classes = ['font-classic', 'font-modern', 'font-elegant', 'font-traditional', 'font-formal'];
            classes.forEach(function(c) { container.classList.remove(c); });
            container.classList.add('font-' + fontName);

            document.querySelectorAll('.font-option').forEach(function(option) {
                option.classList.toggle('active', option.dataset.font === fontName);
            });
            try { localStorage.setItem('font', fontName); } catch (e) {}
        }

        fontButton.addEventListener('click', function(e) {
            e.stopPropagation();
            fontSelector.classList.toggle('show');
            shareMenu.classList.remove('show');
            document.getElementById('calendarPanel').classList.remove('show');
        });

        document.querySelectorAll('.font-option').forEach(function(option) {
            option.addEventListener('click', function() {
                setFont(option.dataset.font);
                fontSelector.classList.remove('show');
            });
        });

        // ─── Share Handling ───────────────────────────────────
        const shareButton = document.getElementById('shareButton');
        const shareMenu = document.getElementById('shareMenu');

        shareButton.addEventListener('click', function(e) {
            e.stopPropagation();
            fontSelector.classList.remove('show');
            shareMenu.classList.toggle('show');
            document.getElementById('calendarPanel').classList.remove('show');
        });

        async function shareAsImage(useNativeShare) {
            if (!currentVerse) return;

            // Update capture area with both languages
            document.getElementById('captureQuoteEn').textContent = '\u201C' + currentVerse.english.quote + '\u201D';
            document.getElementById('captureReferenceEn').textContent = '\u2014 ' + currentVerse.english.reference;
            document.getElementById('captureQuoteZh').textContent = '\u300C' + currentVerse.chinese.quote + '\u300D';
            document.getElementById('captureReferenceZh').textContent = '\u2014 ' + currentVerse.chinese.reference;

            try {
                var captureElement = document.getElementById('quoteCapture');
                var bgColor = getComputedStyle(document.documentElement).getPropertyValue('--container-bg').trim();
                var canvas = await html2canvas(captureElement, {
                    scale: 3,
                    backgroundColor: bgColor,
                    logging: false,
                    useCORS: true,
                    allowTaint: true
                });

                if (useNativeShare) {
                    // Check if native share with files is supported
                    if (navigator.share && navigator.canShare) {
                        var blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
                        var file = new File([blob], 'daily-bible-quote.png', { type: 'image/png' });
                        var shareData = {
                            files: [file],
                            title: 'Daily Bible Quote',
                            text: currentVerse.english.quote + '\n\u2014 ' + currentVerse.english.reference
                        };
                        if (navigator.canShare(shareData)) {
                            await navigator.share(shareData);
                        } else {
                            // Device doesn't support file sharing, fall back to download
                            downloadCanvas(canvas);
                        }
                    } else {
                        // No native share API (desktop browser), just download
                        downloadCanvas(canvas);
                    }
                } else {
                    downloadCanvas(canvas);
                }
            } catch (error) {
                // AbortError means user cancelled the share dialog — not an error
                if (error.name !== 'AbortError') {
                    console.error('Error creating share image:', error);
                    downloadCanvas(null);
                }
            }

            shareMenu.classList.remove('show');
        }

        function downloadCanvas(canvas) {
            if (!canvas) {
                showToast('Share not supported, try Download instead');
                return;
            }
            var link = document.createElement('a');
            link.download = 'daily-bible-quote.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('Image downloaded \u2713');
        }

        document.getElementById('shareNative').addEventListener('click', function() { shareAsImage(true); });
        document.getElementById('shareDownload').addEventListener('click', function() { shareAsImage(false); });

        // Close menus on outside click
        document.addEventListener('click', function(e) {
            if (!fontSelector.contains(e.target) && e.target !== fontButton) {
                fontSelector.classList.remove('show');
            }
            if (!shareMenu.contains(e.target) && e.target !== shareButton) {
                shareMenu.classList.remove('show');
            }
            var calPanel = document.getElementById('calendarPanel');
            var calBtn = document.getElementById('calendarButton');
            if (!calPanel.contains(e.target) && e.target !== calBtn) {
                calPanel.classList.remove('show');
            }
        });

        // Close menus on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                fontSelector.classList.remove('show');
                shareMenu.classList.remove('show');
                document.getElementById('calendarPanel').classList.remove('show');
            }
        });

        // ─── Calendar ─────────────────────────────────────────
        var calendarButton = document.getElementById('calendarButton');
        var calendarPanel = document.getElementById('calendarPanel');
        var calMonth = new Date().getMonth();
        var calYear = new Date().getFullYear();

        calendarButton.addEventListener('click', function(e) {
            e.stopPropagation();
            fontSelector.classList.remove('show');
            shareMenu.classList.remove('show');
            calendarPanel.classList.toggle('show');
            if (calendarPanel.classList.contains('show')) {
                // Reset to current viewing month
                var ref = viewingDate || new Date();
                calMonth = ref.getMonth();
                calYear = ref.getFullYear();
                renderCalendar();
            }
        });

        document.getElementById('calPrev').addEventListener('click', function(e) {
            e.stopPropagation();
            calMonth--;
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCalendar();
        });

        document.getElementById('calNext').addEventListener('click', function(e) {
            e.stopPropagation();
            calMonth++;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            renderCalendar();
        });

        document.getElementById('calTodayBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            viewingDate = null;
            calMonth = new Date().getMonth();
            calYear = new Date().getFullYear();
            updateDate();
            displayQuote();
            renderCalendar();
            calendarPanel.classList.remove('show');
        });

        function renderCalendar() {
            var today = new Date();
            var selected = viewingDate || today;
            var monthNames = ['January','February','March','April','May','June',
                              'July','August','September','October','November','December'];
            var zhMonths = ['一月','二月','三月','四月','五月','六月',
                            '七月','八月','九月','十月','十一月','十二月'];

            document.getElementById('calTitle').textContent = monthNames[calMonth] + ' ' + calYear + ' ' + zhMonths[calMonth];

            // Prevent navigating to future months
            var nextBtn = document.getElementById('calNext');
            if (calYear > today.getFullYear() || (calYear === today.getFullYear() && calMonth >= today.getMonth())) {
                nextBtn.style.visibility = 'hidden';
            } else {
                nextBtn.style.visibility = 'visible';
            }

            // Show "back to today" button if viewing a different date
            var todayBtn = document.getElementById('calTodayBtn');
            if (viewingDate && !isSameDay(viewingDate, today)) {
                todayBtn.classList.add('show');
            } else {
                todayBtn.classList.remove('show');
            }

            var grid = document.getElementById('calGrid');
            grid.innerHTML = '';

            var firstDay = new Date(calYear, calMonth, 1).getDay();
            var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            var daysInPrevMonth = new Date(calYear, calMonth, 0).getDate();

            // Previous month trailing days
            for (var i = firstDay - 1; i >= 0; i--) {
                var dayEl = document.createElement('div');
                dayEl.className = 'calendar-day other-month';
                dayEl.textContent = daysInPrevMonth - i;
                grid.appendChild(dayEl);
            }

            // Current month days
            for (var d = 1; d <= daysInMonth; d++) {
                var dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                dayEl.textContent = d;

                var thisDate = new Date(calYear, calMonth, d);

                // Mark future days
                if (thisDate > today) {
                    dayEl.classList.add('future');
                } else {
                    // Clickable past/present days
                    (function(date) {
                        dayEl.addEventListener('click', function(e) {
                            e.stopPropagation();
                            viewingDate = date;
                            updateDate(date);
                            displayQuote(date);
                            renderCalendar();
                            calendarPanel.classList.remove('show');
                        });
                    })(thisDate);
                }

                // Highlight today
                if (isSameDay(thisDate, today)) {
                    dayEl.classList.add('today');
                }

                // Highlight selected date
                if (isSameDay(thisDate, selected)) {
                    dayEl.classList.add('selected');
                }

                grid.appendChild(dayEl);
            }

            // Next month leading days
            var totalCells = firstDay + daysInMonth;
            var remaining = (7 - (totalCells % 7)) % 7;
            for (var i = 1; i <= remaining; i++) {
                var dayEl = document.createElement('div');
                dayEl.className = 'calendar-day other-month';
                dayEl.textContent = i;
                grid.appendChild(dayEl);
            }
        }

        // ─── Initialize ──────────────────────────────────────
        updateDate();
        displayQuote();

        // Schedule update at midnight instead of fixed 24h interval
        function scheduleNextUpdate() {
            var now = new Date();
            var tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            var msUntilMidnight = tomorrow - now + 1000;
            setTimeout(function() {
                updateDate();
                displayQuote();
                scheduleNextUpdate();
            }, msUntilMidnight);
        }
        scheduleNextUpdate();
    </script>
